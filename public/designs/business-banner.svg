<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="640" viewBox="0 0 1920 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2e8f0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#e2e8f0" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="640" fill="url(#bg)"/>
  <circle cx="1520" cy="220" r="220" fill="url(#accent)"/>
  <circle cx="1640" cy="420" r="260" fill="url(#accent)"/>

  <text x="140" y="220" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="56" fill="#e2e8f0" font-weight="800">
    Business Banner
  </text>
  <text x="140" y="280" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="28" fill="#cbd5e1">
    Headline • Value proposition • Contact / CTA
  </text>

  <rect x="140" y="340" width="520" height="72" rx="18" fill="#e2e8f0"/>
  <text x="400" y="387" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="26" fill="#0f172a" font-weight="800">
    Your Offer / Website
  </text>

  <text x="140" y="520" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="20" fill="#94a3b8">
    Replace this SVG with your Canva export (PNG/JPG)
  </text>
</svg>
